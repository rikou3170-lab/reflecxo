<style>
:root {
  --bg:#EEEAF6;--bg-warm:#E6E0F0;--card:#FFFFFF;--border:#E8E0F0;--border-light:#F0EAF5;
  --lav:#8B7CB8;--lav-dk:#6B5A9E;--lav-lt:#C4B0E0;--lav-bg:#F3EFF9;--lav-glow:#EDE6F6;
  --gold:#C9A24D;--gold-soft:#D4B76A;
  --text:#3E3650;--text-mid:#6B617E;--text-lt:#9D93AE;
  --ok:#7BA07E;--ok-bg:#EDF5EE;--warn:#C4A24E;--warn-bg:#FFF8E8;--danger:#C07B7B;
  --sh-sm:0 1px 4px rgba(62,54,80,.04);--sh:0 2px 14px rgba(62,54,80,.06);--sh-lg:0 8px 30px rgba(62,54,80,.1);
  --r:14px;--rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background-image:radial-gradient(ellipse at 0% 0%,rgba(139,124,184,.04) 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,rgba(201,162,77,.04) 0%,transparent 50%)}
.sidebar{background:linear-gradient(180deg,#3E3650 0%,#5A4D6E 100%);width:220px;position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column;box-shadow:2px 0 20px rgba(62,54,80,.1)}
.sidebar-brand{padding:28px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand h1{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;font-style:italic;color:var(--lav-lt);line-height:1.3}
.sidebar-brand p{font-size:10px;color:rgba(255,255,255,.4);font-weight:600;letter-spacing:.04em;margin-top:6px}
.sidebar-nav{padding:16px 10px;flex:1}
.tab-btn{display:flex;align-items:center;gap:10px;padding:12px 16px;border:none;background:none;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;border-radius:var(--rs);transition:all .25s;position:relative;width:100%;text-align:left;margin-bottom:4px}
.tab-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.06)}
.tab-btn.active{color:#E8D5F0;background:rgba(139,124,184,.2)}
.tab-btn.active::after{display:none}
.tab-icon{font-size:15px;width:22px;text-align:center}
.main-content{margin-left:220px;padding:28px 32px 60px}
.page-header{margin-bottom:24px}
.page-header h2{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--lav-dk);font-style:italic}
.page-header p{color:var(--text-lt);font-size:13px;margin-top:4px;font-weight:500}
.card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--r);box-shadow:var(--sh);padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;font-style:italic;margin-bottom:16px;color:var(--lav-dk);display:flex;align-items:center;gap:10px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--r);padding:22px 20px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lav-lt),var(--lav),var(--gold-soft))}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-lt);font-weight:700;margin-bottom:8px}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--lav-dk)}
.stat-sub{font-size:12px;color:var(--text-lt);margin-top:4px;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:25px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .25s;font-family:'Quicksand',sans-serif}
.btn-primary{background:linear-gradient(135deg,var(--lav) 0%,var(--lav-dk) 100%);color:#fff;box-shadow:0 3px 12px rgba(139,124,184,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(139,124,184,.35)}
.btn-primary:disabled{opacity:.5;cursor:default;transform:none}
.btn-secondary{background:var(--lav-bg);color:var(--lav-dk);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--lav-glow)}
.btn-danger{background:#FDF2F0;color:var(--danger);border:1px solid #F0D5D5}
.btn-danger:hover{background:#FAE5E5}
.btn-sm{padding:6px 16px;font-size:12px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-mid);margin-bottom:6px;letter-spacing:.03em}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:25px;font-size:14px;font-family:'Quicksand',sans-serif;color:var(--text);background:var(--card);transition:all .2s;font-weight:500}
.form-textarea{border-radius:var(--rs);resize:vertical;min-height:70px}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--lav-lt);box-shadow:0 0 0 3px rgba(139,124,184,.1)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-lt);text-align:left;padding:10px 12px;border-bottom:2px solid var(--border);font-weight:700}
td{padding:14px 12px;border-bottom:1px solid var(--border-light);font-size:13px;font-weight:500}
tr:hover td{background:var(--lav-bg)}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700}
.badge-paid{background:var(--ok-bg);color:var(--ok)}
.badge-pending{background:var(--warn-bg);color:var(--warn)}
.modal-overlay{position:fixed;inset:0;background:rgba(62,54,80,.3);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg)}
.modal-header{padding:22px 26px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;font-style:italic;color:var(--lav-dk)}
.modal-close{background:var(--lav-bg);border:none;width:34px;height:34px;border-radius:50%;font-size:16px;color:var(--text-lt);cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{padding:24px 26px}
.modal-footer{padding:16px 26px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:10px}
.service-option{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border:1.5px solid var(--border-light);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .2s;background:var(--card)}
.service-option:hover{border-color:var(--lav-lt);background:var(--lav-bg)}
.service-option.selected{border-color:var(--lav);background:var(--lav-bg);box-shadow:0 0 0 3px rgba(139,124,184,.08)}
.service-name{font-size:13px;font-weight:600}
.service-detail{font-size:11px;color:var(--text-lt);margin-top:2px;font-weight:500}
.service-price{font-weight:700;color:var(--lav-dk);font-size:15px;white-space:nowrap}
.qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:8px}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--lav-lt);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--lav-dk);font-weight:700}
.qty-btn:hover{background:var(--lav-bg)}
.qty-val{font-size:14px;font-weight:700;min-width:22px;text-align:center;color:var(--lav-dk)}
.invoice-preview{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:32px;font-size:13px;position:relative;overflow:hidden}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.svc-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--r);padding:22px 20px;box-shadow:var(--sh-sm);display:flex;flex-direction:column;justify-content:space-between;transition:all .25s;position:relative;overflow:hidden}
.svc-card:hover{box-shadow:var(--sh);transform:translateY(-2px)}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lav-lt),var(--gold-soft));opacity:0;transition:opacity .25s}
.svc-card:hover::after{opacity:1}
.svc-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;font-style:italic;color:var(--lav-dk);margin-bottom:8px}
.svc-desc{font-size:12px;color:var(--text-lt);line-height:1.5;margin-bottom:14px;font-weight:500}
.svc-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border-light)}
.svc-duration{font-size:12px;color:var(--text-lt);font-weight:600}
.svc-price{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--lav-dk)}
.empty-state{text-align:center;padding:48px 20px;color:var(--text-lt)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px;font-weight:500}
.clickable-row{cursor:pointer}
.ornament-divider{display:flex;align-items:center;gap:12px;margin:8px 0 20px;color:var(--lav-lt);font-size:12px}
.ornament-divider::before,.ornament-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.chart-bar-wrap{display:flex;align-items:flex-end;gap:8px;height:160px;padding-top:10px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.chart-bar{width:100%;max-width:36px;background:linear-gradient(180deg,var(--lav-lt) 0%,var(--lav) 100%);border-radius:8px 8px 0 0;transition:height .5s ease;min-height:2px}
.chart-label{font-size:10px;color:var(--text-lt);margin-top:6px;font-weight:600}
.chart-val{font-size:10px;font-weight:700;color:var(--lav-dk);margin-bottom:4px}
.invoice-total-row{display:flex;justify-content:flex-end;align-items:center;margin-top:16px;padding-top:14px;border-top:2px solid var(--lav)}
.invoice-total-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-lt);margin-right:20px;font-weight:700}
.invoice-total-value{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--lav-dk)}
.invoice-footer-note{margin-top:28px;padding-top:14px;border-top:1px solid var(--border-light);font-size:10px;color:var(--text-lt);text-align:center;line-height:1.7;font-weight:500}
@media(max-width:768px){
  .sidebar{position:fixed!important;bottom:0!important;left:0!important;right:0!important;top:auto!important;width:100%!important;height:auto!important;flex-direction:row!important;z-index:100;border-radius:0!important;box-shadow:0 -2px 16px rgba(62,54,80,.12);background:linear-gradient(90deg,#3E3650,#5A4D6E);padding-bottom:env(safe-area-inset-bottom)}
  .sidebar-brand{display:none!important}
  .sidebar-nav{display:flex!important;flex-direction:row!important;padding:8px 4px;gap:0;justify-content:space-around;width:100%}
  .tab-btn{flex-direction:column!important;padding:6px 4px!important;font-size:10px!important;gap:2px!important;border-radius:8px;min-width:0;flex:1;text-align:center;justify-content:center}
  .tab-icon{font-size:18px!important}
  .tab-label{font-size:9px!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
  .main-content{margin-left:0!important;padding:16px 14px 100px!important;max-width:100%}
  .page-header h2{font-size:22px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{padding:14px 12px}
  .stat-value{font-size:22px}
  .svc-grid{grid-template-columns:1fr}
  .card{padding:16px;margin-bottom:14px}
  .form-input,.form-select,.form-textarea{font-size:16px!important;padding:12px 14px}
  .btn{padding:12px 20px}
  .btn-primary{font-size:14px}
  table{font-size:12px}
  th{font-size:9px;padding:8px 6px}
  td{padding:10px 6px;font-size:12px}
  .modal{max-width:100%!important;margin:10px;border-radius:16px}
  .modal-header{padding:16px 18px}
  .modal-body{padding:16px 18px}
  .modal-footer{padding:12px 18px;flex-wrap:wrap}
  .modal-footer .btn{flex:1;min-width:100px;justify-content:center;font-size:12px}
  .invoice-preview{padding:20px 16px;font-size:12px}
  .chart-bar-wrap{height:120px}
  .service-option{padding:12px}
  .alert-popup-inner{padding:24px 20px;margin:10px}
  .login-box{margin:16px;padding:32px 24px}
  .login-input{font-size:18px}
  .svc-card{padding:16px 14px}
  .boncadeau-grid{grid-template-columns:1fr!important}
}
@media(max-width:380px){
  .stats-grid{grid-template-columns:1fr}
  .modal-footer .btn{min-width:80px;font-size:11px;padding:10px 12px}
  .tab-label{font-size:8px;max-width:55px}
}
.splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#3E3650 0%,#5A4D6E 40%,#8B7CB8 100%);transition:opacity .8s ease,transform .8s ease}
.splash.fade-out{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-lotus{animation:splashPulse 2s ease-in-out infinite}
.splash-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;font-style:italic;color:#E8D5F0;margin-top:24px;text-align:center;opacity:0;animation:splashFadeUp .8s ease .3s forwards}
.splash-sub{font-family:'Quicksand',sans-serif;font-size:13px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:.06em;margin-top:8px;opacity:0;animation:splashFadeUp .8s ease .6s forwards}
.splash-line{width:60px;height:2px;background:linear-gradient(90deg,transparent,#C4B0E0,transparent);margin-top:20px;opacity:0;animation:splashFadeUp .8s ease .9s forwards}
.splash-dots{margin-top:32px;display:flex;gap:8px;opacity:0;animation:splashFadeUp .6s ease 1.2s forwards}
.splash-dot{width:6px;height:6px;border-radius:50%;background:#C4B0E0;animation:dotBounce 1.2s ease infinite}
.splash-dot:nth-child(2){animation-delay:.2s}
.splash-dot:nth-child(3){animation-delay:.4s}
@keyframes splashPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}
@keyframes splashFadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-6px);opacity:1}}
.alert-popup{position:fixed;inset:0;z-index:9998;background:rgba(62,54,80,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;animation:alertFadeIn .4s ease}
.alert-popup-inner{background:#fff;border-radius:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(62,54,80,.2);padding:36px 32px}
.alert-popup-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;font-style:italic;color:var(--lav-dk);text-align:center;margin-bottom:8px}
.alert-popup-sub{font-size:13px;color:var(--text-lt);text-align:center;margin-bottom:28px;font-weight:500}
.alert-section{margin-bottom:24px;padding:20px;border-radius:16px}
.alert-section-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;font-style:italic;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.alert-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.alert-item:last-child{border-bottom:none}
.alert-close-btn{display:block;width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--lav),var(--lav-dk));color:#fff;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(139,124,184,.3);transition:transform .2s}
.alert-close-btn:hover{transform:translateY(-1px)}
@keyframes alertFadeIn{from{opacity:0}to{opacity:1}}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3E3650 0%,#5A4D6E 40%,#8B7CB8 100%)}
.login-box{background:#fff;border-radius:24px;padding:48px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(62,54,80,.25)}
.login-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;font-style:italic;color:var(--lav-dk);margin:20px 0 8px}
.login-sub{font-size:13px;color:var(--text-lt);margin-bottom:28px;font-weight:500}
.login-input{width:100%;padding:14px 20px;border:2px solid var(--border);border-radius:16px;font-size:20px;font-family:'Quicksand',sans-serif;text-align:center;letter-spacing:8px;font-weight:700;color:var(--lav-dk);background:var(--lav-bg);transition:border .2s}
.login-input:focus{outline:none;border-color:var(--lav)}
.login-btn{width:100%;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--lav),var(--lav-dk));color:#fff;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;box-shadow:0 4px 16px rgba(139,124,184,.3)}
.login-btn:hover{transform:translateY(-1px)}
.login-btn:disabled{opacity:.5;cursor:default;transform:none}
.login-error{color:var(--danger);font-size:12px;font-weight:600;margin-top:12px}
</style>

function parseBirthday(s) {
  // Accepte JJ/MM/AAAA, JJ-MM-AAAA, JJ.MM.AAAA ou YYYY-MM-DD
  if (!s) return null;
  var t = s.trim();
  var m = t.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})$/);
  if (m) {
    var day = parseInt(m[1],10);
    var month = parseInt(m[2],10) - 1;
    var year = parseInt(m[3],10);
    if (year < 100) year += 1900;
    if (month < 0 || month > 11 || day < 1 || day > 31) return null;
    return {day: day, month: month, year: year};
  }
  var m2 = t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m2) {
    return {day: parseInt(m2[3],10), month: parseInt(m2[2],10)-1, year: parseInt(m2[1],10)};
  }
  return null;
}

function pdfFallback(innerHtml, filename) {
  // Solution de secours iOS : genere un PDF telechargeable
  var container = document.createElement("div");
  container.innerHTML = innerHtml;
  container.style.position = "absolute";
  container.style.top = "0";
  container.style.left = "0";
  container.style.zIndex = "-99999";
  document.body.appendChild(container);
  var target = container.querySelector(".page") || container.querySelector(".sheet");
  var opt = {
    margin: 0,
    filename: filename,
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false, backgroundColor: "#ffffff" },
    jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
  };
  var waitFonts = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
  waitFonts.then(function(){
    setTimeout(function(){
      window.html2pdf().set(opt).from(target).save().then(function(){
        try { document.body.removeChild(container); } catch(e){}
      }).catch(function(){
        try { document.body.removeChild(container); } catch(e){}
      });
    }, 200);
  });
}

function doPrint(inv) {
  var inner = buildFactureHtml(inv, true);
  var h = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Facture " + inv.number + "</title>" +
    "<link href='https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Quicksand:wght@400;500;600;700&display=swap' rel='stylesheet'>" +
    "</head><body>" + inner + "</body></html>";
  var w = window.open("", "_blank");
  if (w) {
    w.document.write(h);
    w.document.close();
    setTimeout(function () {
      w.print();
    }, 600);
  } else {
    // iOS / popup bloque : PDF telechargeable
    pdfFallback(buildFactureHtml(inv, false), "facture-" + inv.number + ".pdf");
  }
}
